<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Painel Candidato</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #070818;
    --surface: #11131f;
    --surface-2: #161a2c;
    --border: #252f4a;
    --accent: #7b8bff;
    --text: #e6e8ff;
    --muted: #8d94b1;
    --success: #34d399;
    --danger: #ff6b6b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { min-height: 100vh; background: radial-gradient(circle at top left, rgba(123,139,255,0.22), transparent 28%), var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }
  .page { max-width: 1200px; margin: 0 auto; padding: 24px; }
  .topbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 16px 20px; background: rgba(17,19,31,.9); border: 1px solid rgba(255,255,255,.05); border-radius: 18px; backdrop-filter: blur(12px); }
  .logo { font-family:'Syne',sans-serif; font-size: 20px; font-weight: 800; letter-spacing: .08em; }
  .nav-links { display: flex; gap: 12px; flex-wrap: wrap; }
  .nav-links a { padding: 10px 16px; border-radius: 12px; text-decoration: none; color: var(--muted); font-size: 13px; background: rgba(255,255,255,.03); }
  .nav-links a.active { color: #fff; background: rgba(123,139,255,.16); }
  .header-actions { display: flex; gap: 12px; align-items: center; position: relative; }
  .profile-menu { position: relative; }
  .profile-btn { display: inline-flex; align-items: center; justify-content: center; width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08); color: var(--text); font-weight: 700; cursor: pointer; }
  .profile-menu-list { position: absolute; right: 0; top: calc(100% + 10px); width: 196px; padding: 10px 0; background: rgba(17,19,31,.98); border: 1px solid rgba(255,255,255,.08); border-radius: 18px; box-shadow: 0 18px 40px rgba(0,0,0,.35); opacity: 0; visibility: hidden; transform: translateY(-10px); transition: opacity .18s ease, transform .18s ease, visibility .18s ease; z-index: 10; }
  .profile-menu.open .profile-menu-list { opacity: 1; visibility: visible; transform: translateY(0); }
  .profile-menu-link { display: flex; align-items: center; gap: 10px; padding: 12px 16px; color: var(--text); text-decoration: none; font-size: 14px; }
  .profile-menu-link:hover { background: rgba(255,255,255,.05); }
  .profile-menu-title { display: block; width: 100%; padding: 12px 16px; color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .08em; }
  .btn-secondary { padding: 10px 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,.08); background: rgba(255,255,255,.03); color: var(--text); text-decoration: none; }
  .layout { display: grid; grid-template-columns: 1.85fr 1fr; gap: 20px; margin-top: 24px; }
  .main-card, .side-card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 24px; }
  .main-card { min-height: 520px; }
  .main-card h2, .side-card h3 { font-family:'Syne',sans-serif; font-size: 20px; margin-bottom: 16px; }
  .resume-box { height: 440px; background: rgba(255,255,255,.04); border: 1px dashed rgba(255,255,255,.08); border-radius: 18px; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 14px; text-transform: uppercase; letter-spacing: .12em; }
  .side-stack { display: grid; gap: 18px; }
  .photo-box { height: 170px; background: rgba(255,255,255,.06); border-radius: 18px; display: grid; place-items: center; font-size: 18px; color: var(--muted); }
  .info-box { min-height: 120px; background: rgba(255,255,255,.04); border-radius: 18px; padding: 18px; color: var(--text); }
  .info-box p { color: var(--muted); line-height: 1.7; font-size: 14px; }
  .skill-list { display: grid; gap: 10px; margin-top: 12px; }
  .skill-pill { display: inline-flex; align-items: center; justify-content: center; padding: 10px 14px; border-radius: 999px; background: rgba(123,139,255,.12); color: #c7d0ff; font-size: 13px; }
  .footer-note { margin-top: 24px; padding: 18px; border-radius: 18px; background: rgba(123,139,255,.08); color: #c7d0ff; font-size: 13px; }
  @media(max-width: 960px) { .layout { grid-template-columns: 1fr; } }
</style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="logo">Candidato</div>
      <div class="nav-links">
        <a class="active" href="#">Empresas</a>
        <a href="#">Currículos</a>
        <a href="#">Competências</a>
      </div>
      <div class="header-actions">
        <div class="profile-menu" id="profileMenu">
          <button class="profile-btn" onclick="toggleProfileMenu(event)">CP</button>
          <div class="profile-menu-list">
            <span class="profile-menu-title">Conta</span>
            <a class="profile-menu-link" href="#">Perfil</a>
            <a class="profile-menu-link" href="#">Configurações</a>
            <a class="profile-menu-link" href="testeSite.html">Sair</a>
          </div>
        </div>
      </div>
    </div>
    <div class="layout">
      <div class="main-card">
        <h2>Currículo</h2>
        <div class="resume-box">Área do currículo</div>
      </div>
      <div class="side-card">
        <div class="side-stack">
          <div class="photo-box">Foto</div>
          <div class="info-box">
            <h3>Descrição</h3>
            <p>Resumo rápido sobre você, suas experiências e objetivos profissionais.</p>
          </div>
          <div class="info-box">
            <h3>Habilidades</h3>
            <div class="skill-list">
              <span class="skill-pill">Soft Skill</span>
              <span class="skill-pill">Hard Skill</span>
              <span class="skill-pill">Comunicação</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    function toggleProfileMenu(event) {
      event.stopPropagation();
      const menu = document.getElementById('profileMenu');
      menu.classList.toggle('open');
    }

    document.addEventListener('click', function(event) {
      const menu = document.getElementById('profileMenu');
      if (!menu) return;
      if (!event.target.closest('.profile-menu')) {
        menu.classList.remove('open');
      }
    });
  </script>
</body>
</html>
